<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LastSys 감정지도</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260513a)}" href="../static/css/mainpage.css?v=20260513a">
    <link rel="stylesheet" th:href="@{/css/map.css(v=20260521a)}" href="../static/css/map.css?v=20260521a">
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page home-app map-app" aria-label="LastSys 감정지도 화면">
    <section class="dashboard map-dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
            <form th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">로그아웃</button>
            </form>
        </header>

        <section class="map-shell" aria-label="감정지도">
            <div class="map-filter">
                <button id="map-filter-toggle" class="map-filter-toggle" type="button" aria-label="지도 필터 메뉴" aria-expanded="false" aria-controls="map-filter-panel">
                    <span aria-hidden="true"></span>
                </button>
            </div>
            <form id="map-search-form" class="map-search-form" autocomplete="off">
                <input id="map-search-input" type="search" placeholder="위치 검색" aria-label="위치 검색">
                <button type="submit">검색</button>
            </form>
            <div class="map-stage">
                <div id="map" class="emotion-map" aria-label="카카오 지도"></div>
                <button id="map-filter-backdrop" class="map-filter-backdrop" type="button" aria-label="필터 메뉴 닫기" hidden></button>
                <section id="map-filter-panel" class="map-filter-panel" aria-label="감정핀 필터" hidden>
                    <div class="map-filter-head">
                        <strong>감정핀 보기</strong>
                        <span id="map-filter-summary">전체</span>
                    </div>
                    <div class="map-filter-actions">
                        <button class="map-filter-chip is-active" type="button" data-filter-type="all">전체</button>
                        <button class="map-filter-chip" type="button" data-filter-type="mine">내 감정핀</button>
                    </div>
                    <div id="map-emotion-filters" class="map-emotion-filters" aria-label="감정별 핀 보기"></div>
                </section>
                <div id="map-search-results" class="map-search-results" hidden></div>
                <div class="map-crosshair" aria-hidden="true"></div>
                <button id="open-marker-modal" class="open-marker-modal" type="button">기록하기</button>
            </div>
            <div id="map-message" class="map-message" role="status">지도를 불러오는 중입니다.</div>
        </section>
    </section>
</main>

<div id="marker-modal" class="marker-modal" hidden>
    <button id="marker-modal-backdrop" class="marker-modal-backdrop" type="button" aria-label="기록하기 닫기"></button>
    <section class="marker-modal-panel" role="dialog" aria-modal="true" aria-labelledby="marker-modal-title">
        <div class="marker-modal-head">
            <div>
                <h2 id="marker-modal-title">기록하기</h2>
                <p>선택한 위치에 감정 마커를 남겨보세요.</p>
            </div>
            <button id="close-marker-modal" class="marker-modal-close" type="button" aria-label="기록하기 닫기">×</button>
        </div>

        <form id="emotion-marker-form" class="emotion-marker-form" autocomplete="off">
            <div class="emotion-picker" role="radiogroup" aria-label="감정 선택">
                <label class="emotion-option" data-emotion-id="default-happiness">
                    <input type="radio" name="emotion" value="happiness" data-label="기쁨" data-color="#765A08" checked>
                    <span>기쁨</span>
                </label>
                <label class="emotion-option" data-emotion-id="default-anticipation">
                    <input type="radio" name="emotion" value="anticipation" data-label="기대" data-color="#4F711F">
                    <span>기대</span>
                </label>
                <label class="emotion-option" data-emotion-id="default-sadness">
                    <input type="radio" name="emotion" value="sadness" data-label="슬픔" data-color="#315C86">
                    <span>슬픔</span>
                </label>
                <label class="emotion-option" data-emotion-id="default-anger">
                    <input type="radio" name="emotion" value="anger" data-label="분노" data-color="#9D312B">
                    <span>분노</span>
                </label>
                <label class="emotion-option" data-emotion-id="default-anxiety">
                    <input type="radio" name="emotion" value="anxiety" data-label="불안" data-color="#5C477D">
                    <span>불안</span>
                </label>
                <label class="emotion-option" data-emotion-id="default-embarrassment">
                    <input type="radio" name="emotion" value="embarrassment" data-label="당황" data-color="#8B3D66">
                    <span>당황</span>
                </label>
                <label class="emotion-option" data-emotion-id="default-surprise">
                    <input type="radio" name="emotion" value="surprise" data-label="놀람" data-color="#28746F">
                    <span>놀람</span>
                </label>
                <label class="emotion-option" data-emotion-id="default-irritation">
                    <input type="radio" name="emotion" value="irritation" data-label="짜증" data-color="#925021">
                    <span>짜증</span>
                </label>
            </div>
            <div class="marker-fields">
                <label>
                    <span>위치</span>
                    <input id="marker-location" type="text" maxlength="40" placeholder="위치 이름을 적어주세요" required>
                    <input id="marker-location-selected" type="hidden">
                </label>
                <div id="marker-location-results" class="marker-location-results" hidden></div>
                <label>
                    <span>제목</span>
                    <input id="marker-title" type="text" maxlength="24" placeholder="지금의 마음" required>
                </label>
                <label>
                    <span>설명</span>
                    <textarea id="marker-description" maxlength="90" rows="2" placeholder="짧게 적어보세요" required></textarea>
                </label>
            </div>
            <button class="marker-submit" type="submit">마커 추가</button>
        </form>
    </section>
</div>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a th:href="@{/}" href="/">홈</a>
    <a class="active" th:href="@{/map}" href="/map">감정지도</a>
    <a th:href="@{/profile}" href="/profile">프로필</a>
</nav>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=193ceb4c1a6b6b4e4651b199d5836ee5&libraries=services"></script>
<script>
    (function () {
        var container = document.getElementById('map');
        var message = document.getElementById('map-message');
        var searchForm = document.getElementById('map-search-form');
        var searchInput = document.getElementById('map-search-input');
        var searchResults = document.getElementById('map-search-results');
        var markerModal = document.getElementById('marker-modal');
        var openMarkerModalButton = document.getElementById('open-marker-modal');
        var closeMarkerModalButton = document.getElementById('close-marker-modal');
        var markerModalBackdrop = document.getElementById('marker-modal-backdrop');
        var filterToggleButton = document.getElementById('map-filter-toggle');
        var filterPanel = document.getElementById('map-filter-panel');
        var filterBackdrop = document.getElementById('map-filter-backdrop');
        var filterSummary = document.getElementById('map-filter-summary');
        var emotionFilters = document.getElementById('map-emotion-filters');

        if (!window.kakao || !window.kakao.maps) {
            message.textContent = '지도를 불러오지 못했습니다. Kakao JavaScript 키와 도메인 설정을 확인해주세요.';
            message.classList.add('is-error');
            return;
        }

        var form = document.getElementById('emotion-marker-form');
        var markerLocationInput = document.getElementById('marker-location');
        var markerLocationSelectedInput = document.getElementById('marker-location-selected');
        var markerLocationResults = document.getElementById('marker-location-results');
        var titleInput = document.getElementById('marker-title');
        var descriptionInput = document.getElementById('marker-description');
        var defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567);
        var currentPosition = defaultPosition;
        var selectedPosition = defaultPosition;
        var hasCurrentPosition = false;
        var searchedPlaces = [];
        var markerPlaces = [];
        var emotionMarkerItems = [];
        var activeEmotionFilter = 'ALL';
        var showOnlyMine = false;
        var activeInfoOverlay = null;
        var searchTimer = null;
        var markerLocationTimer = null;
        var options = {
            center: defaultPosition,
            level: 5,
            draggable: true
        };
        var emotionFilterOptions = [
            { label: '기쁨', color: '#765A08' },
            { label: '기대', color: '#4F711F' },
            { label: '슬픔', color: '#315C86' },
            { label: '분노', color: '#9D312B' },
            { label: '불안', color: '#5C477D' },
            { label: '당황', color: '#8B3D66' },
            { label: '놀람', color: '#28746F' },
            { label: '짜증', color: '#925021' }
        ];

        var map = new kakao.maps.Map(container, options);
        map.setDraggable(true);
        var places = kakao.maps.services ? new kakao.maps.services.Places() : null;
        var currentLocationElement = document.createElement('div');
        currentLocationElement.className = 'current-location-dot';
        currentLocationElement.setAttribute('aria-label', '현재 위치');

        var currentLocationOverlay = new kakao.maps.CustomOverlay({
            position: currentPosition,
            content: currentLocationElement,
            yAnchor: 0.5,
            xAnchor: 0.5,
            zIndex: 4
        });

        currentLocationOverlay.setMap(map);
        message.textContent = '현재 위치를 확인하는 중입니다.';

        function openMarkerModal() {
            markerModal.hidden = false;
            document.body.classList.add('is-marker-modal-open');
            window.setTimeout(function () {
                markerLocationInput.focus();
            }, 120);
        }

        function closeMarkerModal() {
            markerModal.hidden = true;
            document.body.classList.remove('is-marker-modal-open');
            openMarkerModalButton.focus();
        }

        function moveTo(position, level) {
            currentPosition = position;
            hasCurrentPosition = true;
            currentLocationOverlay.setPosition(position);
            map.setLevel(level);
            map.setCenter(position);
        }

        function formatPosition(position) {
            return position.getLat().toFixed(6) + ', ' + position.getLng().toFixed(6);
        }

        function formatPlace(place) {
            return place.place_name + ' · ' + (place.road_address_name || place.address_name || '주소 정보 없음');
        }

        function placeSearchOptions() {
            var baseLocation = hasCurrentPosition ? currentPosition : map.getCenter();
            var options = {
                location: baseLocation
            };

            if (kakao.maps.services.SortBy) {
                options.sort = kakao.maps.services.SortBy.DISTANCE;
            }

            return options;
        }

        function formatDistance(distance) {
            var meters = Number(distance);

            if (!Number.isFinite(meters)) {
                return '';
            }

            if (meters >= 1000) {
                return (meters / 1000).toFixed(meters >= 10000 ? 0 : 1) + 'km';
            }

            return Math.round(meters) + 'm';
        }

        function placeAddressText(place) {
            var address = place.road_address_name || place.address_name || '주소 정보 없음';
            var distance = formatDistance(place.distance);
            return distance ? distance + ' · ' + address : address;
        }

        function chooseMapPlace(index) {
            var place = searchedPlaces[index];

            if (!place) {
                return;
            }

            var searchedPosition = new kakao.maps.LatLng(place.y, place.x);

            selectedPosition = searchedPosition;
            map.setLevel(4);
            map.setCenter(searchedPosition);
            searchInput.value = place.place_name;
            searchInput.blur();
            searchResults.hidden = true;
            showNotice((index + 1) + '번째 검색 위치를 선택했습니다.');
        }

        function showError(text) {
            message.textContent = text;
            message.classList.add('is-error');
            message.hidden = false;
        }

        function showNotice(text) {
            message.textContent = text;
            message.classList.remove('is-error');
            message.hidden = false;

            window.setTimeout(function () {
                message.hidden = true;
            }, 1800);
        }

        function setFilterPanelOpen(isOpen) {
            if (!filterToggleButton || !filterPanel) {
                return;
            }

            filterPanel.hidden = !isOpen;
            if (filterBackdrop) {
                filterBackdrop.hidden = !isOpen;
            }
            filterToggleButton.setAttribute('aria-expanded', String(isOpen));
        }

        function markerMatchesFilter(item) {
            if (showOnlyMine && !item.own) {
                return false;
            }

            return activeEmotionFilter === 'ALL' || item.emotionLabel === activeEmotionFilter;
        }

        function applyMarkerFilters() {
            var visibleCount = 0;

            emotionMarkerItems.forEach(function (item) {
                var visible = markerMatchesFilter(item);
                item.markerOverlay.setMap(visible ? map : null);

                if (!visible && activeInfoOverlay === item.infoOverlay) {
                    item.infoOverlay.setMap(null);
                    activeInfoOverlay = null;
                }

                if (visible) {
                    visibleCount += 1;
                }
            });

            updateFilterMenu(visibleCount);
        }

        function updateFilterMenu(visibleCount) {
            if (filterSummary) {
                var summaryText = activeEmotionFilter === 'ALL' ? '전체' : activeEmotionFilter;
                filterSummary.textContent = summaryText + ' ' + visibleCount + '개';
            }

            document.querySelectorAll('.map-filter-chip').forEach(function (chip) {
                var filterType = chip.dataset.filterType;
                var emotionLabel = chip.dataset.emotionLabel;
                var isActive = filterType === 'all' && !showOnlyMine && activeEmotionFilter === 'ALL'
                    || filterType === 'mine' && showOnlyMine
                    || emotionLabel && emotionLabel === activeEmotionFilter;

                chip.classList.toggle('is-active', Boolean(isActive));
            });
        }

        function renderEmotionFilters() {
            if (!emotionFilters) {
                return;
            }

            var counts = emotionMarkerItems.reduce(function (result, item) {
                result[item.emotionLabel] = (result[item.emotionLabel] || 0) + 1;
                return result;
            }, {});

            emotionFilters.innerHTML = emotionFilterOptions.map(function (emotion) {
                var count = counts[emotion.label] || 0;
                return '<button class="map-filter-chip" type="button" data-emotion-label="' + escapeHtml(emotion.label) + '" style="--chip-color: ' + emotion.color + '">' +
                    escapeHtml(emotion.label) + ' ' + count +
                    '</button>';
            }).join('');

            updateFilterMenu(emotionMarkerItems.filter(markerMatchesFilter).length);
        }

        filterToggleButton?.addEventListener('click', function () {
            setFilterPanelOpen(filterPanel.hidden);
        });

        filterBackdrop?.addEventListener('click', function () {
            setFilterPanelOpen(false);
        });

        filterPanel?.addEventListener('click', function (event) {
            var filterButton = event.target.closest('.map-filter-chip');

            if (!filterButton || !filterPanel.contains(filterButton)) {
                return;
            }

            if (filterButton.dataset.filterType === 'all') {
                activeEmotionFilter = 'ALL';
                showOnlyMine = false;
            } else if (filterButton.dataset.filterType === 'mine') {
                activeEmotionFilter = 'ALL';
                showOnlyMine = true;
            } else if (filterButton.dataset.emotionLabel) {
                activeEmotionFilter = filterButton.dataset.emotionLabel;
                showOnlyMine = false;
            }

            applyMarkerFilters();
        });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function (position) {
                    var userPosition = new kakao.maps.LatLng(
                        position.coords.latitude,
                        position.coords.longitude
                    );

                    moveTo(userPosition, 4);
                    message.hidden = true;
                },
                function () {
                    showError('현재 위치를 가져오지 못했습니다. 브라우저 위치 권한을 허용해주세요.');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 60000
                }
            );
        } else {
            showError('이 브라우저에서는 현재 위치 기능을 지원하지 않습니다.');
        }

        kakao.maps.event.addListener(map, 'center_changed', function () {
            selectedPosition = map.getCenter();
        });

        kakao.maps.event.addListener(map, 'click', function (mouseEvent) {
            selectedPosition = mouseEvent.latLng;
            map.panTo(selectedPosition);
            searchResults.hidden = true;
        });

        function renderSearchResults(results) {
            searchResults.innerHTML = '';
            searchedPlaces = results.slice(0, 5);

            searchedPlaces.forEach(function (place, index) {
                var resultButton = document.createElement('button');
                resultButton.type = 'button';
                resultButton.className = 'map-search-result';
                resultButton.innerHTML =
                    '<strong>' + escapeHtml(place.place_name) + '</strong>' +
                    '<span>' + escapeHtml(placeAddressText(place)) + '</span>';

                resultButton.addEventListener('click', function () {
                    chooseMapPlace(index);
                });

                searchResults.appendChild(resultButton);
            });

            searchResults.hidden = false;
        }

        function searchPlaces() {
            var keyword = searchInput.value.trim();

            if (keyword.length < 2) {
                searchResults.hidden = true;
                return;
            }

            if (!places) {
                showError('위치 검색을 사용할 수 없습니다. Kakao 지도 services 라이브러리를 확인해주세요.');
                return;
            }

            places.keywordSearch(keyword, function (results, status) {
                if (status !== kakao.maps.services.Status.OK || !results.length) {
                    searchResults.hidden = true;
                    return;
                }

                renderSearchResults(results);
            }, placeSearchOptions());
        }

        searchForm.addEventListener('submit', function (event) {
            event.preventDefault();
            searchPlaces();
        });

        searchInput.addEventListener('input', function () {
            window.clearTimeout(searchTimer);

            searchTimer = window.setTimeout(function () {
                searchPlaces();
            }, 220);
        });

        function renderMarkerLocationResults(results) {
            markerLocationResults.innerHTML = '';
            markerPlaces = results.slice(0, 5);

            markerPlaces.forEach(function (place) {
                var resultButton = document.createElement('button');
                resultButton.type = 'button';
                resultButton.className = 'marker-location-result';
                resultButton.innerHTML =
                    '<strong>' + escapeHtml(place.place_name) + '</strong>' +
                    '<span>' + escapeHtml(placeAddressText(place)) + '</span>';

                resultButton.addEventListener('click', function () {
                    markerLocationInput.value = place.place_name;
                    markerLocationSelectedInput.value = place.place_name;
                    markerLocationResults.hidden = true;
                    titleInput.focus();
                });

                markerLocationResults.appendChild(resultButton);
            });

            markerLocationResults.hidden = !markerPlaces.length;
        }

        function searchMarkerLocations() {
            var keyword = markerLocationInput.value.trim();

            if (keyword.length < 2) {
                markerPlaces = [];
                markerLocationResults.hidden = true;
                return;
            }

            if (!places) {
                showError('위치 검색을 사용할 수 없습니다. Kakao 지도 services 라이브러리를 확인해주세요.');
                return;
            }

            places.keywordSearch(keyword, function (results, status) {
                if (status !== kakao.maps.services.Status.OK || !results.length) {
                    markerPlaces = [];
                    markerLocationResults.hidden = true;
                    return;
                }

                renderMarkerLocationResults(results);
            }, placeSearchOptions());
        }

        markerLocationInput.addEventListener('input', function () {
            window.clearTimeout(markerLocationTimer);
            markerLocationSelectedInput.value = '';

            markerLocationTimer = window.setTimeout(function () {
                searchMarkerLocations();
            }, 220);
        });

        function escapeHtml(value) {
            return value.replace(/[&<>"']/g, function (match) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[match];
            });
        }

        function createEmotionMarker(position, emotion, title, description, locationName, shouldOpen) {
            var markerElement = document.createElement('button');
            markerElement.type = 'button';
            markerElement.className = 'emotion-map-marker';
            markerElement.style.setProperty('--marker-color', emotion.color);
            markerElement.setAttribute('aria-label', emotion.label + ' 감정 마커: ' + title);
            markerElement.innerHTML = '<span></span>';

            var markerOverlay = new kakao.maps.CustomOverlay({
                position: position,
                content: markerElement,
                yAnchor: 1,
                xAnchor: 0.5,
                zIndex: 6
            });

            var infoElement = document.createElement('article');
            infoElement.className = 'emotion-marker-popup';
            infoElement.style.setProperty('--marker-color', emotion.color);
            infoElement.innerHTML =
                '<strong>' + escapeHtml(title) + '</strong>' +
                '<span>' + escapeHtml(emotion.label) + '</span>' +
                '<small>' + escapeHtml(locationName || formatPosition(position)) + '</small>' +
                '<p>' + escapeHtml(description) + '</p>';

            var infoOverlay = new kakao.maps.CustomOverlay({
                position: position,
                content: infoElement,
                yAnchor: 1.28,
                xAnchor: 0.5,
                zIndex: 7
            });

            markerElement.addEventListener('click', function () {
                if (activeInfoOverlay && activeInfoOverlay !== infoOverlay) {
                    activeInfoOverlay.setMap(null);
                }

                var isOpen = activeInfoOverlay === infoOverlay;
                infoOverlay.setMap(isOpen ? null : map);
                activeInfoOverlay = isOpen ? null : infoOverlay;
            });

            var markerItem = {
                markerOverlay: markerOverlay,
                infoOverlay: infoOverlay,
                emotionLabel: emotion.label,
                own: true
            };
            emotionMarkerItems.push(markerItem);
            renderEmotionFilters();
            markerOverlay.setMap(markerMatchesFilter(markerItem) ? map : null);

            if (shouldOpen) {
                if (activeInfoOverlay) {
                    activeInfoOverlay.setMap(null);
                }

                if (markerMatchesFilter(markerItem)) {
                    infoOverlay.setMap(map);
                    activeInfoOverlay = infoOverlay;
                }
            }
        }

        function markerFromResponse(marker, shouldOpen) {
            if (!marker.latitude || !marker.longitude || !marker.emotionLabel || !marker.title) {
                return;
            }

            createEmotionMarker(
                new kakao.maps.LatLng(marker.latitude, marker.longitude),
                {
                    label: marker.emotionLabel,
                    color: marker.emotionColor
                },
                marker.title,
                marker.description || '',
                marker.locationName || '',
                shouldOpen
            );
        }

        async function loadEmotionMarkers() {
            try {
                var response = await fetch('/api/emotion-map-markers');

                if (!response.ok) {
                    return;
                }

                var markers = await response.json();
                markers.forEach(function (marker) {
                    markerFromResponse(marker, false);
                });
            } catch (error) {
                showError('저장된 감정 마커를 불러오지 못했습니다.');
            }
        }

        async function saveEmotionMarker(marker) {
            var response = await fetch('/api/emotion-map-markers', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(marker)
            });

            if (!response.ok) {
                throw new Error(String(response.status));
            }

            return response.json();
        }

        renderEmotionFilters();
        loadEmotionMarkers();

        form.addEventListener('submit', async function (event) {
            event.preventDefault();

            var checkedEmotion = form.querySelector('input[name="emotion"]:checked');
            var markerPosition = map.getCenter();
            var locationName = markerLocationInput.value.trim();
            var selectedLocationName = markerLocationSelectedInput.value.trim();
            var title = titleInput.value.trim();
            var description = descriptionInput.value.trim();

            if (!locationName || locationName !== selectedLocationName) {
                markerLocationInput.focus();
                showError('위치 리스트에서 위치를 선택해주세요.');
                return;
            }

            if (!title) {
                titleInput.focus();
                return;
            }

            if (!description) {
                descriptionInput.focus();
                showError('설명을 입력해주세요.');
                return;
            }

            try {
                var savedMarker = await saveEmotionMarker({
                    latitude: markerPosition.getLat(),
                    longitude: markerPosition.getLng(),
                    emotionLabel: checkedEmotion.dataset.label,
                    emotionColor: checkedEmotion.dataset.color,
                    title: title,
                    locationName: locationName,
                    description: description
                });

                markerFromResponse(savedMarker, true);
            } catch (error) {
                if (error.message === '401') {
                    showError('로그인 후 감정 마커를 저장할 수 있습니다.');
                } else if (error.message === '400') {
                    showError('입력한 내용을 확인해주세요.');
                } else {
                    showError('감정 마커를 저장하지 못했습니다. 서버 상태를 확인해주세요.');
                }
                return;
            }

            titleInput.value = '';
            descriptionInput.value = '';
            markerLocationInput.value = '';
            markerLocationSelectedInput.value = '';
            markerLocationResults.hidden = true;
            markerPlaces = [];
            closeMarkerModal();
            message.classList.remove('is-error');
            message.textContent = '감정 마커를 추가했습니다.';
            message.hidden = false;

            window.setTimeout(function () {
                message.hidden = true;
            }, 1800);
        });

        openMarkerModalButton.addEventListener('click', openMarkerModal);
        closeMarkerModalButton.addEventListener('click', closeMarkerModal);
        markerModalBackdrop.addEventListener('click', closeMarkerModal);

        window.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && !markerModal.hidden) {
                closeMarkerModal();
            }
        });

        window.addEventListener('resize', function () {
            kakao.maps.event.trigger(map, 'resize');
            map.setCenter(currentPosition);
        });
    })();
</script>
</body>
</html>
