    <style>
        .profile-header-card { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 30px 20px; text-align: center; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #DDEFD8; border: 3px solid #FFFFFF; box-shadow: 0 8px 16px rgba(26, 77, 57, 0.12); display: flex; align-items: center; justify-content: center; font-size: 36px; }
        .profile-info h2 { color: var(--primary-color); font-size: 22px; font-weight: 850; }
        .menu-section { background: rgba(255, 255, 255, 0.76); border: 1px solid rgba(255, 255, 255, 0.92); border-radius: 20px; padding: 16px; box-shadow: 0 12px 24px rgba(26, 77, 57, 0.06); }
        .menu-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .menu-list a, .menu-list button { width: 100%; display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 14px; background: rgba(248, 250, 249, 0.88); border: 1px solid rgba(26, 77, 57, 0.08); color: inherit; font: inherit; font-size: 15px; font-weight: 750; text-decoration: none; cursor: pointer; transition: transform 0.15s ease; }
        .menu-list a:active, .menu-list button:active { transform: scale(0.98); }
        .menu-list .icon { width: 34px; height: 34px; border-radius: 50%; background: var(--primary-color); color: #FFFFFF; display: flex; align-items: center; justify-content: center; font-size: 15px; }
        .text-danger { color: #e74c3c !important; }
        .text-danger .icon { background: #ffeaea; color: #e74c3c; }
        .text-gray .icon { background: #f1f3f5; color: #666; }
    </style>
</head>
