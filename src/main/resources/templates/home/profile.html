<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="application-name" th:content="${appName}" content="Plia">
    <title th:text="|${appName} 프로필|">Plia 프로필</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <link rel="stylesheet" th:href="@{/css/base/home.css(v=20260512b)}" href="../../static/css/base/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/pages/mainpage.css(v=20260519b)}" href="../../static/css/pages/mainpage.css?v=20260519b">
    <link rel="stylesheet" th:href="@{/css/pages/profile.css(v=20260620c)}" href="../../static/css/pages/profile.css?v=20260620c">
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<main class="mobile-page home-app" th:aria-label="|${appName} 프로필 화면|" aria-label="Plia 프로필 화면">
    <div class="bg-shape bg-shape-3"></div>
    <section class="dashboard">
        <!-- 상단 헤더 -->
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" th:alt="|${appName} 로고|" alt="Plia 로고">
                <span th:text="${appName}">Plia</span>
            </a>
        </header>

        <div class="main-content">
            <p class="profile-message" th:if="${deleteErrorMsg}" th:text="${deleteErrorMsg}">회원 탈퇴 오류</p>

            <!-- 1. 프로필 상단 정보 (기존 quote-card 디자인 재활용) -->
            <article class="quote-card profile-header-card" aria-label="내 프로필 정보">
                <div class="profile-avatar" aria-hidden="true">🌿</div>
                <div class="profile-info">
                    <h2><strong th:text="${loginUser != null ? loginUser.nickname() : '사용자'}">닉네임</strong>님</h2>
                </div>
            </article>

            <!-- 2. 내 활동 관리 메뉴 -->
            <section class="menu-section" aria-label="내 활동 관리">
                <ul class="menu-list">
                    <li>
                        <a th:href="@{/profile/mission-settings}" href="/profile/mission-settings">
                            <span>선행 미션 방식 설정</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/profile/edit}" href="/profile/edit">
                            <span>프로필 수정</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/profile/change-password}" href="/profile/change-password">
                            <span>비밀번호 변경</span>
                        </a>
                    </li>
                </ul>
            </section>

            <!-- 3. 계정 관리 메뉴 -->
            <section class="menu-section" aria-label="계정 관리">
                <ul class="menu-list">
                    <li>
                        <!-- 로그아웃은 POST 방식으로 처리하도록 Form 형태 유지 -->
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="text-gray">
                                <span>로그아웃</span>
                            </button>
                        </form>
                    </li>
                    <li>
                        <button id="open-delete-modal" type="button" class="text-danger">
                            <span>회원 탈퇴</span>
                        </button>
                    </li>
                </ul>
            </section>
        </div>
    </section>
</main>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}" href="/map">감정지도</a>
    <a class="active" th:href="@{/profile}" href="/profile">프로필</a>
</nav>

<section id="delete-modal" class="delete-modal" hidden aria-labelledby="delete-modal-title" aria-modal="true" role="dialog">
    <button id="delete-modal-backdrop" class="delete-modal-backdrop" type="button" aria-label="회원 탈퇴 취소"></button>
    <form class="delete-modal-dialog" th:action="@{/profile/delete-account}" action="/profile/delete-account" method="post" autocomplete="off">
        <h2 id="delete-modal-title">회원 탈퇴</h2>
        <p>
            탈퇴하면 계정과 활동 기록이 삭제됩니다. 계속하려면 아래 입력창에
            <span class="delete-confirm-word">탈퇴</span>를 입력해주세요.
        </p>
        <input id="delete-confirm-input" class="delete-confirm-input" name="confirmation" type="text" placeholder="탈퇴" aria-label="회원 탈퇴 확인 문구">
        <div class="delete-modal-actions">
            <button id="delete-modal-cancel" class="delete-cancel" type="button">취소</button>
            <button id="delete-submit" class="delete-submit" type="submit" disabled>탈퇴하기</button>
        </div>
    </form>
</section>

<script th:src="@{/js/pages/profile.js(v=20260620a)}" src="../../static/js/pages/profile.js?v=20260620a" defer></script>
</body>
</html>
