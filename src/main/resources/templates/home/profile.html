<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LastSys 프로필</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- 기존 CSS를 그대로 불러와서 통일감을 유지합니다 -->
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260513a)}" href="../../static/css/mainpage.css?v=20260513a">
    
    <!-- 프로필 전용 소소한 추가 스타일 (나중에 css 파일로 빼셔도 됩니다) -->
    <style>
        .profile-header-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 30px 20px;
            text-align: center;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #DDEFD8;
            border: 3px solid #FFFFFF;
            box-shadow: 0 8px 16px rgba(26, 77, 57, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .profile-info h2 {
            color: var(--primary-color);
            font-size: 22px;
            font-weight: 850;
        }
        .profile-info p {
            color: var(--text-sub, #666);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 600;
        }
        .menu-section {
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 12px 24px rgba(26, 77, 57, 0.06);
        }
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .menu-list a, .menu-list button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(248, 250, 249, 0.88);
            border: 1px solid rgba(26, 77, 57, 0.08);
            color: inherit;
            font: inherit;
            font-size: 15px;
            font-weight: 750;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .menu-list a:active, .menu-list button:active {
            transform: scale(0.98);
        }
        .menu-list .icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }
        .text-danger { color: #e74c3c !important; }
        .text-danger .icon { background: #ffeaea; color: #e74c3c; }
        .text-gray .icon { background: #f1f3f5; color: #666; }
        .profile-message {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(231, 76, 60, 0.1);
            color: #c0392b;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
        }
        .delete-modal[hidden] {
            display: none;
        }
        .delete-modal {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .delete-modal-backdrop {
            position: absolute;
            inset: 0;
            border: 0;
            background: rgba(20, 36, 29, 0.45);
            backdrop-filter: blur(6px);
            cursor: pointer;
        }
        .delete-modal-dialog {
            position: relative;
            z-index: 1;
            width: min(100%, 360px);
            padding: 22px 20px 18px;
            border: 1px solid rgba(255, 255, 255, 0.96);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 28px 70px rgba(16, 34, 26, 0.28);
        }
        .delete-modal-dialog h2 {
            color: #c0392b;
            font-size: 21px;
            font-weight: 950;
            line-height: 1.3;
        }
        .delete-modal-dialog p {
            margin-top: 10px;
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 700;
            line-height: 1.5;
            word-break: keep-all;
        }
        .delete-confirm-word {
            color: #c0392b;
            font-weight: 950;
        }
        .delete-confirm-input {
            width: 100%;
            height: 48px;
            margin-top: 16px;
            padding: 0 14px;
            border: 1.5px solid rgba(231, 76, 60, 0.18);
            border-radius: 14px;
            background: rgba(248, 250, 249, 0.94);
            color: var(--text-main);
            font: inherit;
            font-size: 15px;
            font-weight: 750;
            outline: none;
        }
        .delete-confirm-input:focus {
            border-color: rgba(231, 76, 60, 0.55);
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.12);
        }
        .delete-modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 18px;
        }
        .delete-modal-actions button {
            min-height: 46px;
            border-radius: 14px;
            font: inherit;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
        }
        .delete-cancel {
            border: 1px solid rgba(26, 77, 57, 0.12);
            background: rgba(248, 250, 249, 0.96);
            color: var(--primary-color);
        }
        .delete-submit {
            border: 0;
            background: #e74c3c;
            color: #FFFFFF;
            box-shadow: 0 12px 24px rgba(231, 76, 60, 0.18);
        }
        .delete-submit:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            box-shadow: none;
        }
    </style>
</head>
<body>
<!-- 배경 그래픽 (기존 메인과 동일) -->
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page home-app" aria-label="LastSys 프로필 화면">
    <section class="dashboard">
        <!-- 상단 헤더 -->
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
        </header>

        <div class="main-content">
            <p class="profile-message" th:if="${deleteErrorMsg}" th:text="${deleteErrorMsg}">회원 탈퇴 오류</p>

            <!-- 1. 프로필 상단 정보 (기존 quote-card 디자인 재활용) -->
            <article class="quote-card profile-header-card" aria-label="내 프로필 정보">
                <div class="profile-avatar">🌿</div>
                <div class="profile-info">
                    <h2><strong th:text="${loginUser != null ? loginUser.nickname() : '사용자'}">닉네임</strong>님</h2>
                </div>
            </article>

            <!-- 2. 내 활동 관리 메뉴 -->
            <section class="menu-section" aria-label="내 활동 관리">
                <ul class="menu-list">
                    <li>
                        <a th:href="@{/profile/mission-settings}" href="/profile/mission-settings">
                            <span class="icon">⚙️</span>
                            <span>선행 미션 방식 설정</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/profile/edit}" href="/profile/edit">
                            <span class="icon">✏️</span>
                            <span>프로필 수정</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/profile/change-password}" href="/profile/change-password">
                            <span class="icon">🔒</span>
                            <span>비밀번호 변경</span>
                        </a>
                    </li>
                </ul>
            </section>

            <!-- 3. 계정 관리 메뉴 -->
            <section class="menu-section" aria-label="계정 관리">
                <ul class="menu-list">
                    <li>
                        <!-- 로그아웃은 POST 방식으로 처리하도록 Form 형태 유지 -->
                        <form th:action="@{/logout}" method="post" style="margin: 0; width: 100%;">
                            <button type="submit" class="text-gray">
                                <span class="icon">👋</span>
                                <span>로그아웃</span>
                            </button>
                        </form>
                    </li>
                    <li>
                        <button id="open-delete-modal" type="button" class="text-danger">
                            <span class="icon">⚠️</span>
                            <span>회원 탈퇴</span>
                        </button>
                    </li>
                </ul>
            </section>
        </div>
    </section>
</main>

<!-- 하단 네비게이션 탭 (프로필에 active 클래스 이동) -->
<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}">감정지도</a>
    <a class="active" th:href="@{/profile}" href="/profile">프로필</a>
</nav>

<section id="delete-modal" class="delete-modal" hidden aria-labelledby="delete-modal-title" aria-modal="true" role="dialog">
    <button id="delete-modal-backdrop" class="delete-modal-backdrop" type="button" aria-label="회원 탈퇴 취소"></button>
    <form class="delete-modal-dialog" th:action="@{/profile/delete-account}" action="/profile/delete-account" method="post" autocomplete="off">
        <h2 id="delete-modal-title">회원 탈퇴</h2>
        <p>
            탈퇴하면 계정과 활동 기록이 삭제됩니다. 계속하려면 아래 입력창에
            <span class="delete-confirm-word">탈퇴</span>를 입력해주세요.
        </p>
        <input id="delete-confirm-input" class="delete-confirm-input" name="confirmation" type="text" placeholder="탈퇴" aria-label="회원 탈퇴 확인 문구">
        <div class="delete-modal-actions">
            <button id="delete-modal-cancel" class="delete-cancel" type="button">취소</button>
            <button id="delete-submit" class="delete-submit" type="submit" disabled>탈퇴하기</button>
        </div>
    </form>
</section>

<script>
    (function () {
        var modal = document.getElementById('delete-modal');
        var openButton = document.getElementById('open-delete-modal');
        var closeButton = document.getElementById('delete-modal-cancel');
        var backdrop = document.getElementById('delete-modal-backdrop');
        var input = document.getElementById('delete-confirm-input');
        var submit = document.getElementById('delete-submit');

        function openModal() {
            modal.hidden = false;
            input.value = '';
            submit.disabled = true;
            window.setTimeout(function () {
                input.focus();
            }, 80);
        }

        function closeModal() {
            modal.hidden = true;
            openButton.focus();
        }

        openButton.addEventListener('click', openModal);
        closeButton.addEventListener('click', closeModal);
        backdrop.addEventListener('click', closeModal);
        input.addEventListener('input', function () {
            submit.disabled = input.value.trim() !== '탈퇴';
        });
        window.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && !modal.hidden) {
                closeModal();
            }
        });
    })();
</script>
</body>
</html>
