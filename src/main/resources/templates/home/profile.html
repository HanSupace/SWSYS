<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LastSys 프로필</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- 기존 CSS를 그대로 불러와서 통일감을 유지합니다 -->
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260513a)}" href="../../static/css/mainpage.css?v=20260513a">
    
    <!-- 프로필 전용 소소한 추가 스타일 (나중에 css 파일로 빼셔도 됩니다) -->
    <style>
        .profile-header-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 30px 20px;
            text-align: center;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #DDEFD8;
            border: 3px solid #FFFFFF;
            box-shadow: 0 8px 16px rgba(26, 77, 57, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .profile-info h2 {
            color: var(--primary-color);
            font-size: 22px;
            font-weight: 850;
        }
        .profile-info p {
            color: var(--text-sub, #666);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 600;
        }
        .menu-section {
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 12px 24px rgba(26, 77, 57, 0.06);
        }
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .menu-list a, .menu-list button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(248, 250, 249, 0.88);
            border: 1px solid rgba(26, 77, 57, 0.08);
            color: inherit;
            font: inherit;
            font-size: 15px;
            font-weight: 750;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .menu-list a:active, .menu-list button:active {
            transform: scale(0.98);
        }
        .menu-list .icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }
        .text-danger { color: #e74c3c !important; }
        .text-danger .icon { background: #ffeaea; color: #e74c3c; }
        .text-gray .icon { background: #f1f3f5; color: #666; }
        .mission-settings {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .mission-settings form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .mission-settings-head {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .mission-settings-head h3 {
            color: var(--primary-color);
            font-size: 18px;
            font-weight: 850;
        }
        .mission-settings-head p {
            color: var(--text-sub, #666);
            font-size: 13px;
            font-weight: 650;
            line-height: 1.45;
            word-break: keep-all;
        }
        .mission-settings-saved {
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(49, 112, 74, 0.1);
            color: var(--primary-color);
            font-size: 13px;
            font-weight: 800;
        }
        .mission-mode-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .mission-mode-options label {
            min-height: 62px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid rgba(26, 77, 57, 0.1);
            border-radius: 14px;
            background: rgba(248, 250, 249, 0.88);
            color: var(--text-main);
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }
        .mission-mode-options input {
            accent-color: var(--primary-color);
        }
        .mission-setting-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .mission-setting-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .mission-setting-field span {
            color: var(--text-sub, #666);
            font-size: 12px;
            font-weight: 850;
        }
        .mission-setting-field select {
            width: 100%;
            height: 46px;
            padding: 0 12px;
            border: 1px solid rgba(26, 77, 57, 0.12);
            border-radius: 12px;
            background: rgba(248, 250, 249, 0.94);
            color: var(--text-main);
            font: inherit;
            font-size: 14px;
            font-weight: 750;
        }
        .mission-setting-grid.is-disabled {
            opacity: 0.48;
        }
        .mission-setting-grid.is-disabled select {
            cursor: not-allowed;
        }
        .mission-settings-submit {
            width: 100%;
            min-height: 48px;
            border: 0;
            border-radius: 15px;
            background: var(--primary-color);
            color: #FFFFFF;
            font: inherit;
            font-size: 14px;
            font-weight: 850;
            cursor: pointer;
            box-shadow: 0 12px 22px rgba(26, 77, 57, 0.16);
        }
    </style>
</head>
<body>
<!-- 배경 그래픽 (기존 메인과 동일) -->
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page home-app" aria-label="LastSys 프로필 화면">
    <section class="dashboard">
        <!-- 상단 헤더 -->
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
        </header>

        <div class="main-content">
            <!-- 1. 프로필 상단 정보 (기존 quote-card 디자인 재활용) -->
            <article class="quote-card profile-header-card" aria-label="내 프로필 정보">
                <div class="profile-avatar">🌿</div>
                <div class="profile-info">
                    <h2><strong th:text="${loginUser != null ? loginUser.nickname() : '사용자'}">닉네임</strong>님</h2>
                </div>
            </article>

            <section class="menu-section mission-settings" aria-label="선행 미션 설정">
                <div class="mission-settings-head">
                    <h3>선행 미션 방식</h3>
                    <p>평범 모드는 랜덤 미션을, 규칙 기반 모드는 현재 역할과 상황에 맞는 미션을 우선 보여줍니다.</p>
                </div>
                <p class="mission-settings-saved" th:if="${param.missionSettingsSaved}">미션 설정이 저장되었습니다.</p>

                <form th:action="@{/profile/mission-settings}" th:object="${missionSettingsForm}" method="post">
                    <div class="mission-mode-options" role="radiogroup" aria-label="미션 제공 방식">
                        <label>
                            <input type="radio" th:field="*{mode}" value="PLAIN">
                            <span>평범 모드</span>
                        </label>
                        <label>
                            <input type="radio" th:field="*{mode}" value="RULE_BASED">
                            <span>규칙 기반 모드</span>
                        </label>
                    </div>

                    <div class="mission-setting-grid" id="mission-rule-fields">
                        <label class="mission-setting-field">
                            <span>직업/역할</span>
                            <select th:field="*{lifeStage}" data-rule-field>
                                <option value="ANY">상관없음</option>
                                <option value="STUDENT">학생</option>
                                <option value="WORKER">직장인</option>
                                <option value="FREELANCER">프리랜서</option>
                                <option value="CAREGIVER">돌봄/가사 중심</option>
                            </select>
                        </label>

                        <label class="mission-setting-field">
                            <span>주로 있는 환경</span>
                            <select th:field="*{environmentType}" data-rule-field>
                                <option value="ANY">상관없음</option>
                                <option value="SCHOOL">학교</option>
                                <option value="OFFICE">회사</option>
                                <option value="HOME">집</option>
                                <option value="OUTSIDE">외부/이동 중</option>
                            </select>
                        </label>

                        <label class="mission-setting-field">
                            <span>오늘의 상태</span>
                            <select th:field="*{conditionType}" data-rule-field>
                                <option value="NORMAL">보통</option>
                                <option value="SAD">우울/가라앉음</option>
                                <option value="TIRED">피곤함</option>
                                <option value="STRESSED">스트레스</option>
                            </select>
                        </label>
                    </div>

                    <button class="mission-settings-submit" type="submit">저장하기</button>
                </form>
            </section>

            <!-- 2. 내 활동 관리 메뉴 -->
            <section class="menu-section" aria-label="내 활동 관리">
                <ul class="menu-list">
                    <li>
                        <a href="#">
                            <span class="icon">✏️</span>
                            <span>프로필 수정</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="icon">🔒</span>
                            <span>비밀번호 변경</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="icon">📝</span>
                            <span>나의 감정 기록 보기</span>
                        </a>
                    </li>
                </ul>
            </section>

            <!-- 3. 계정 관리 메뉴 -->
            <section class="menu-section" aria-label="계정 관리">
                <ul class="menu-list">
                    <li>
                        <!-- 로그아웃은 POST 방식으로 처리하도록 Form 형태 유지 -->
                        <form th:action="@{/logout}" method="post" style="margin: 0; width: 100%;">
                            <button type="submit" class="text-gray">
                                <span class="icon">👋</span>
                                <span>로그아웃</span>
                            </button>
                        </form>
                    </li>
                    <li>
                        <a href="#" class="text-danger">
                            <span class="icon">⚠️</span>
                            <span>회원 탈퇴</span>
                        </a>
                    </li>
                </ul>
            </section>
        </div>
    </section>
</main>

<!-- 하단 네비게이션 탭 (프로필에 active 클래스 이동) -->
<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a th:href="@{/}" href="/">홈</a>
    <a href="#">감정지도</a>
    <a class="active" th:href="@{/profile}" href="/profile">프로필</a>
</nav>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const modeInputs = document.querySelectorAll('input[name="mode"]');
        const ruleFields = document.querySelectorAll('[data-rule-field]');
        const ruleFieldGroup = document.getElementById('mission-rule-fields');

        const updateRuleFields = () => {
            const selectedMode = document.querySelector('input[name="mode"]:checked')?.value || 'PLAIN';
            const disabled = selectedMode !== 'RULE_BASED';

            ruleFields.forEach((field) => {
                field.disabled = disabled;
            });
            ruleFieldGroup?.classList.toggle('is-disabled', disabled);
        };

        modeInputs.forEach((input) => {
            input.addEventListener('change', updateRuleFields);
        });
        updateRuleFields();
    });
</script>
</body>
</html>
