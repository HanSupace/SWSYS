<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="application-name" th:content="${appName}" content="Plia">
    <title th:text="|${appName} 메인|">Plia 메인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/base/home.css(v=20260512b)}" href="../../static/css/base/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/pages/mainpage.css(v=20260531d)}" href="../../static/css/pages/mainpage.css?v=20260531d">
    <th:block th:replace="~{fragments/emotions :: assets}"></th:block>
    <script th:src="@{/js/shared/progress.js(v=20260620a)}" src="../../static/js/shared/progress.js?v=20260620a" defer></script>
    <script th:src="@{/js/pages/mainpage.js(v=20260620a)}" src="../../static/js/pages/mainpage.js?v=20260620a" defer></script>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>  <main class="mobile-page home-app" th:aria-label="|${appName} 메인 화면|" aria-label="Plia 메인 화면">

    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" th:alt="|${appName} 로고|" alt="Plia 로고">
                <span th:text="${appName}">Plia</span>
            </a>
            <form th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">로그아웃</button>
            </form>
        </header>

        <div class="main-content">
            <a class="today-hero" th:href="@{/ranking}" href="/ranking" aria-label="랭킹 페이지로 이동">
                <h1><strong th:text="${loginUser.nickname()}">닉네임</strong>님</h1>
                <p>오늘도 반가워요!</p>
                <div class="hero-progress" aria-label="사용자 레벨과 경험치">
                    <div class="hero-progress-top">
                        <span id="user-xp" th:text="|${progress.currentXp()} / ${progress.requiredXp()} XP|">XP</span>
                        <strong id="user-level" th:text="|Lv. ${progress.level()}|">Lv</strong>
                    </div>
                    <div class="xp-track" aria-hidden="true">
                        <span id="user-xp-bar" th:data-progress="${progress.progressPercent()}" data-progress="0"></span>
                    </div>
                </div>
            </a>

            <section class="emotion-checkin" aria-labelledby="emotion-checkin-title">
                <div class="emotion-checkin-head">
                    <h2 id="emotion-checkin-title">오늘은 어떤 감정을 느끼셨나요?</h2>
                </div>
                <div class="emotion-button-box" id="emotion-button-box" aria-label="감정 선택">
                    <button class="emotion-choice"
                            th:each="emotion : ${emotions}"
                            type="button"
                            th:data-emotion-id="${emotion.id()}"
                            th:data-emotion-code="${emotion.code()}"
                            th:data-emotion="${emotion.label()}"
                            th:text="${emotion.label()}"
                            data-emotion-id="default-happiness"
                            data-emotion-code="HAPPY"
                            data-emotion="기쁨"
                            aria-pressed="false">기쁨</button>
                </div>
            </section>

            <section class="main-action-grid" aria-label="오늘의 주요 기능">
                <a class="main-action-button main-action-button-mission" th:href="@{/dailymission}" href="/dailymission">
                    <strong>일일미션</strong>
                    <span class="main-action-progress" aria-label="오늘 완료한 미션 수">
                        <span id="mission-progress-count">0/5</span>
                        <span class="main-action-progress-track" aria-hidden="true">
                            <span id="mission-progress-bar"></span>
                        </span>
                    </span>
                </a>
                <a class="main-action-button main-action-button-analysis" th:href="@{/profile/emotion-records}" href="/profile/emotion-records">
                    <strong>감정분석</strong>
                    <span class="main-action-desc">기록 돌아보기</span>
                </a>
            </section>

            <section class="calendar-panel" aria-label="감정 캘린더">
                <div class="emotion-calendar-head">
                    <button id="calendar-prev" type="button" aria-label="이전 달">‹</button>
                    <h2 id="calendar-title">2026. 05</h2>
                    <button id="calendar-next" type="button" aria-label="다음 달">›</button>
                </div>
                <div id="emotion-calendar" class="schedule-calendar"></div>
            </section>
        </div>
    </section>

</main>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a class="active" th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}" href="/map">감정지도</a>
    <a th:href="@{/profile}" href="/profile">프로필</a>
</nav>
</body>
</html>
