<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LastSys 메인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260513a)}" href="../../static/css/mainpage.css?v=20260513a">
    <script th:src="@{/js/mainpage.js(v=20260513a)}" src="../../static/js/mainpage.js?v=20260513a" defer></script>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page home-app" aria-label="LastSys 메인 화면">
    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
            <form th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">로그아웃</button>
            </form>
        </header>

        <div class="main-content">
            <a class="today-hero" th:href="@{/ranking}" href="/ranking" aria-label="랭킹 페이지로 이동">
                <h1><strong th:text="${loginUser.nickname()}">닉네임</strong>님</h1>
                <p>오늘도 반가워요!</p>
                <div class="hero-progress" aria-label="사용자 레벨과 경험치">
                    <div class="hero-progress-top">
                        <span id="user-xp" th:text="|${progress.currentXp()} / ${progress.requiredXp()} XP|">0 / 100 XP</span>
                        <strong id="user-level" th:text="|Lv. ${progress.level()}|">Lv. 1</strong>
                    </div>
                    <div class="xp-track" aria-hidden="true">
                        <span id="user-xp-bar" th:style="|width: ${progress.progressPercent()}%;|"></span>
                    </div>
                </div>
            </a>

            <article class="quote-card" aria-label="오늘의 명언">
                <p th:text="${quote}">작은 기록이 하루의 방향을 만든다.</p>
            </article>

            <section class="calendar-panel" aria-label="감정 캘린더">
                <div class="emotion-calendar-head">
                    <button id="calendar-prev" type="button" aria-label="이전 달">‹</button>
                    <h2 id="calendar-title">2026. 05</h2>
                    <button id="calendar-next" type="button" aria-label="다음 달">›</button>
                </div>
                <div id="emotion-calendar" class="schedule-calendar"></div>
            </section>
        </div>
    </section>

</main>

<section class="mission-panel" id="mission-panel" aria-label="오늘의 선행 미션" aria-hidden="true">
    <div class="mission-panel-head">
        <div>
            <h2>오늘의 미션</h2>
        </div>
        <button class="mission-close" type="button" aria-label="미션 닫기">×</button>
    </div>
    <ul class="mission-list" id="mission-list" aria-live="polite"></ul>
</section>

<section class="mission-confirm" id="mission-confirm" aria-hidden="true">
    <button class="mission-confirm-backdrop" type="button" data-mission-confirm-close aria-label="미션 완료 확인 닫기"></button>
    <div class="mission-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="mission-confirm-title" aria-describedby="mission-confirm-description">
        <div class="mission-confirm-mark" aria-hidden="true">✓</div>
        <h2 id="mission-confirm-title">미션을 완료하셨습니까?</h2>
        <p id="mission-confirm-description">완료로 기록하면 오늘의 진행도와 경험치에 반영됩니다.</p>
        <div class="mission-confirm-actions">
            <button class="mission-confirm-cancel" type="button" data-mission-confirm-close>아직이에요</button>
            <button class="mission-confirm-submit" type="button" id="mission-confirm-submit">완료했어요</button>
        </div>
    </div>
</section>

<button class="floating-toggle" type="button" aria-label="오늘의 선행 미션 열기" aria-controls="mission-panel" aria-expanded="false"></button>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a class="active" th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}" href="/map">감정지도</a>
    <a th:href="@{/profile}" href="/profile">프로필</a>
</nav>
</body>
</html>
