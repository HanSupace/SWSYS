<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LastSys 메인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260531b)}" href="../../static/css/mainpage.css?v=20260531b">
    <script th:src="@{/js/mainpage.js(v=20260531b)}" src="../../static/js/mainpage.js?v=20260531b" defer></script>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<main class="mobile-page home-app" aria-label="LastSys 메인 화면">
<div class="bg-shape bg-shape-3"></div>

    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
            <form th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">로그아웃</button>
            </form>
        </header>

        <div class="main-content">
            <a class="today-hero" th:href="@{/ranking}" href="/ranking" aria-label="랭킹 페이지로 이동">
                <h1><strong th:text="${loginUser.nickname()}">닉네임</strong>님</h1>
                <p>오늘도 반가워요!</p>
                <div class="hero-progress" aria-label="사용자 레벨과 경험치">
                    <div class="hero-progress-top">
                        <span id="user-xp" th:text="|${progress.currentXp()} / ${progress.requiredXp()} XP|">0 / 100 XP</span>
                        <strong id="user-level" th:text="|Lv. ${progress.level()}|">Lv. 1</strong>
                    </div>
                    <div class="xp-track" aria-hidden="true">
                        <span id="user-xp-bar" th:style="|width: ${progress.progressPercent()}%;|"></span>
                    </div>
                </div>
            </a>

            <section class="emotion-checkin" aria-labelledby="emotion-checkin-title">
                <div class="emotion-checkin-head">
                    <h2 id="emotion-checkin-title">오늘은 어떤 감정을 느끼셨나요?</h2>
                </div>
                <div class="emotion-button-box" id="emotion-button-box" aria-label="감정 선택">
                    <button class="emotion-choice" type="button" data-emotion-id="default-happiness" data-emotion="기쁨" data-tone="joy" aria-pressed="false">기쁨</button>
                    <button class="emotion-choice" type="button" data-emotion-id="default-anticipation" data-emotion="기대" data-tone="joy" aria-pressed="false">기대</button>
                    <button class="emotion-choice" type="button" data-emotion-id="default-sadness" data-emotion="슬픔" data-tone="sadness" aria-pressed="false">슬픔</button>
                    <button class="emotion-choice" type="button" data-emotion-id="default-anger" data-emotion="분노" data-tone="anger" aria-pressed="false">분노</button>
                    <button class="emotion-choice" type="button" data-emotion-id="default-anxiety" data-emotion="불안" data-tone="melancholy" aria-pressed="false">불안</button>
                    <button class="emotion-choice" type="button" data-emotion-id="default-embarrassment" data-emotion="당황" data-tone="melancholy" aria-pressed="false">당황</button>
                    <button class="emotion-choice" type="button" data-emotion-id="default-surprise" data-emotion="놀람" data-tone="joy" aria-pressed="false">놀람</button>
                    <button class="emotion-choice" type="button" data-emotion-id="default-irritation" data-emotion="짜증" data-tone="anger" aria-pressed="false">짜증</button>
                </div>
            </section>

            <section class="main-action-grid" aria-label="오늘의 주요 기능">
                <a class="main-action-button main-action-button-mission" th:href="@{/dailymission}" href="/dailymission">
                    <strong>일일미션</strong>
                    <span class="main-action-progress" aria-label="오늘 완료한 미션 수">
                        <span id="mission-progress-count">0/5</span>
                        <span class="main-action-progress-track" aria-hidden="true">
                            <span id="mission-progress-bar"></span>
                        </span>
                    </span>
                </a>
                <a class="main-action-button main-action-button-analysis" th:href="@{/profile/emotion-records}" href="/profile/emotion-records">
                    <strong>감정분석</strong>
                    <span class="main-action-desc">기록 돌아보기</span>
                </a>
            </section>

            <section class="calendar-panel" aria-label="감정 캘린더">
                <div class="emotion-calendar-head">
                    <button id="calendar-prev" type="button" aria-label="이전 달">‹</button>
                    <h2 id="calendar-title">2026. 05</h2>
                    <button id="calendar-next" type="button" aria-label="다음 달">›</button>
                </div>
                <div id="emotion-calendar" class="schedule-calendar"></div>
            </section>
        </div>
    </section>

</main>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a class="active" th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}" href="/map">감정지도</a>
    <a th:href="@{/profile}" href="/profile">프로필</a>
</nav>
</body>
</html>
