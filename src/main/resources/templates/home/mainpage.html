<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LastSys 메인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css}" href="../../static/css/home.css">
    <link rel="stylesheet" th:href="@{/css/mainpage.css}" href="../../static/css/mainpage.css">
    <script th:src="@{/js/mainpage.js}" src="../../static/js/mainpage.js" defer></script>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page home-app" aria-label="LastSys 메인 화면">
    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
            <form th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">로그아웃</button>
            </form>
        </header>

        <div class="main-content">
            <div class="today-hero">
                <p class="eyebrow">Today</p>
                <h1><strong th:text="${loginUser.nickname()}">닉네임</strong>님</h1>
                <p>오늘 감정을 기록해볼까요?</p>
            </div>

            <article class="quote-card" aria-label="오늘의 명언">
                <p th:text="${quote}">작은 기록이 하루의 방향을 만든다.</p>
            </article>

            <section class="calendar-panel" aria-label="감정 캘린더">
                <div class="emotion-calendar-head">
                    <button id="calendar-prev" type="button" aria-label="이전 달">‹</button>
                    <h2 id="calendar-title">2026. 05</h2>
                    <button id="calendar-next" type="button" aria-label="다음 달">›</button>
                </div>
                <div id="emotion-calendar" class="schedule-calendar"></div>
            </section>
        </div>
    </section>

</main>

<button class="floating-toggle" type="button" aria-label="감정 기록 토글"></button>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a class="active" th:href="@{/}" href="/">홈</a>
    <a href="#">감정지도</a>
    <a href="#">프로필</a>
</nav>
</body>
</html>
