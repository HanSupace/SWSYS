<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="application-name" th:content="${appName}" content="Plia">
    <title th:text="|비밀번호 변경 - ${appName}|">비밀번호 변경 - Plia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260519b)}" href="../../static/css/mainpage.css?v=20260519b">
    <link rel="stylesheet" th:href="@{/css/profile.css(v=20260527a)}" href="../../static/css/profile.css?v=20260527a">
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<main class="mobile-page home-app" th:aria-label="|${appName} 비밀번호 변경 화면|" aria-label="Plia 비밀번호 변경 화면">
    <div class="bg-shape bg-shape-3"></div>
    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" th:alt="|${appName} 로고|" alt="Plia 로고">
                <span th:text="${appName}">Plia</span>
            </a>
        </header>

        <div class="main-content">
            <a th:href="@{/profile}" href="/profile" class="back-btn">← 프로필로 돌아가기</a>
            
            <section class="change-password-section">
                <div class="change-password-head">
                    <h3>비밀번호 변경</h3>
                    <p>안전한 서비스 이용을 위해 비밀번호를 변경해 주세요.</p>
                </div>

                <div th:if="${errorMsg != null}" class="alert-msg alert-error" th:text="${errorMsg}"></div>
                <div th:if="${successMsg != null}" class="alert-msg alert-success" th:text="${successMsg}"></div>

                <form id="password-form" th:action="@{/profile/change-password}" method="post">
                    <div class="input-group">
                        <span>현재 비밀번호</span>
                        <input type="password" name="currentPassword" class="input-field" required placeholder="현재 비밀번호 입력">
                    </div>
                    
                    <div class="input-group">
                        <span>새 비밀번호</span>
                        <input type="password" id="new-pw" name="newPassword" class="input-field" required placeholder="새 비밀번호 입력">
                    </div>
                    
                    <div class="input-group">
                        <span>새 비밀번호 확인</span>
                        <input type="password" id="confirm-pw" name="confirmPassword" class="input-field" required placeholder="새 비밀번호 다시 입력">
                    </div>

                    <button type="submit" class="submit-btn">비밀번호 변경하기</button>
                </form>
            </section>
        </div>
    </section>
</main>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}" href="/map">감정지도</a>
    <a class="active" th:href="@{/profile}" href="/profile">프로필</a>
</nav>
</body>
</html>
