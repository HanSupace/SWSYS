<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="application-name" th:content="${appName}" content="Plia">
    <title th:text="${appName}">Plia</title>
    <!-- 트렌디한 UI 폰트 (Pretendard) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
</head>
<body>
<!-- 배경 포인트 요소 (도트 패턴 + 컬러 빛 번짐) -->
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page" th:aria-label="|${appName} 시작 화면|" aria-label="Plia 시작 화면">
    <section class="welcome">
        <div class="brand">
            <!-- 네모 틀 제거, 로고만 배치 -->
            <img class="logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" th:alt="|${appName} 로고|" alt="Plia 로고">
            <div class="copy">
                <h1 th:text="${appName}">Plia</h1>
                <p>오늘의 감정을 더 선명하게<br>정리하는 스마트 데일리 공간</p>
            </div>
        </div>
        <div class="actions" aria-label="계정 메뉴">
            <a class="button button-primary" th:href="@{/login}" href="/login">시작하기 (로그인)</a>
            <a class="button button-secondary" th:href="@{/signup}" href="/signup">새 계정 만들기</a>
        </div>
    </section>
</main>
</body>
</html>
