<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>나의 감정 기록 - LastSys</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260513a)}">
    
    <style>
        .emotion-records-section { background: rgba(255, 255, 255, 0.76); border: 1px solid rgba(255, 255, 255, 0.92); border-radius: 20px; padding: 20px; box-shadow: 0 12px 24px rgba(26, 77, 57, 0.06); display: flex; flex-direction: column; gap: 16px; }
        .emotion-records-head h3 { color: var(--primary-color); font-size: 18px; font-weight: 850; margin-bottom: 4px; }
        .emotion-records-head p { color: var(--text-sub, #666); font-size: 13px; font-weight: 650; }
        .record-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .record-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-radius: 16px; background: rgba(248, 250, 249, 0.94); border: 1px solid rgba(26, 77, 57, 0.08); }
        .record-info { display: flex; flex-direction: column; gap: 4px; }
        .record-date { color: var(--text-sub, #666); font-size: 12px; font-weight: 750; }
        .record-emotion { color: var(--text-main); font-size: 15px; font-weight: 850; display: flex; align-items: center; gap: 6px; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--text-main); font-weight: 800; text-decoration: none; margin-bottom: 16px; font-size: 15px; }
        .empty-state { text-align: center; padding: 40px 0; color: var(--text-sub); font-size: 14px; font-weight: 700; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page home-app">
    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}">
                <img class="app-logo" th:src="@{/images/logo.png}" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
        </header>

        <div class="main-content">
            <a th:href="@{/profile}" class="back-btn">← 프로필로 돌아가기</a>
            
            <section class="emotion-records-section">
                <div class="emotion-records-head">
                    <h3>나의 감정 기록</h3>
                    <p>최근 기록된 감정 상태를 확인합니다.</p>
                </div>

                <ul class="record-list">
                    <li class="record-item" th:if="${currentCondition != null}">
                        <div class="record-info">
                            <span class="record-date">최근 설정한 상태</span>
                            
                            <span class="record-emotion" th:if="${currentCondition.toString() == 'NORMAL'}">
                                <span>😊</span> 보통
                            </span>
                            <span class="record-emotion" th:if="${currentCondition.toString() == 'SAD'}">
                                <span>☁️</span> 우울/가라앉음
                            </span>
                            <span class="record-emotion" th:if="${currentCondition.toString() == 'TIRED'}">
                                <span>🥱</span> 피곤함
                            </span>
                            <span class="record-emotion" th:if="${currentCondition.toString() == 'STRESSED'}">
                                <span>⚡</span> 스트레스
                            </span>
                        </div>
                    </li>

                    <li class="record-item" th:if="${currentCondition == null or currentCondition.toString() == 'ANY'}">
                        <div class="empty-state" style="width: 100%;">
                            아직 설정된 감정 상태가 없습니다.<br>
                            <a th:href="@{/profile/mission-settings}" style="color: var(--primary-color); font-weight: 800; text-decoration: underline; margin-top: 10px; display: inline-block;">미션 설정하러 가기</a>
                        </div>
                    </li>
                </ul>
            </section>
        </div>
    </section>
</main>

<nav class="bottom-tabs">
    <a th:href="@{/}">홈</a>
    <a href="#">감정지도</a>
    <a class="active" th:href="@{/profile}">프로필</a>
</nav>
</body>
</html>
