<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>나의 감정 분석 - LastSys</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260531b)}" href="../../static/css/mainpage.css?v=20260531b">
    <link rel="stylesheet" th:href="@{/css/profile.css(v=20260531a)}" href="../../static/css/profile.css?v=20260531a">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:src="@{/js/emotion-records.js(v=20260531b)}" src="../../static/js/emotion-records.js?v=20260531b" defer></script>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<main class="mobile-page home-app emotion-records-page" aria-label="LastSys 나의 감정 분석 화면">
    <div class="bg-shape bg-shape-3"></div>
    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
        </header>

        <div class="main-content">
            <div class="emotion-records-topbar">
                <a th:href="@{/}" href="/" class="back-btn">메인 페이지로 돌아가기</a>
            </div>

            <section class="emotion-records-hero" aria-labelledby="emotion-records-title">
                <h1 id="emotion-records-title">나의 감정 분석</h1>
                <p>최근 기록을 바탕으로 감정 흐름과 주변 힐링 스팟을 확인해보세요.</p>
            </section>

            <section class="emotion-insight-card" aria-labelledby="emotion-summary-title">
                <div class="emotion-records-head">
                    <div>
                        <p>최근 7일</p>
                        <h2 id="emotion-summary-title">감정 요약</h2>
                    </div>
                </div>

                <div class="emotion-chart-wrap">
                    <canvas id="myEmotionChart"></canvas>
                    <div id="emotion-chart-empty" class="emotion-chart-empty" hidden>
                        <strong>아직 분석할 감정 기록이 없습니다.</strong>
                        <span>감정지도에 기록을 남기면 이곳에서 요약을 볼 수 있습니다.</span>
                    </div>
                </div>
            </section>

            <section class="emotion-insight-card" aria-labelledby="healing-spot-title">
                <div class="emotion-records-head">
                    <div>
                        <p>현재 위치 기준</p>
                        <h2 id="healing-spot-title">내 주변 힐링 스팟</h2>
                    </div>
                </div>

                <ul class="record-list" id="healing-spot-list">
                    <li class="record-item" id="loading-message">
                        <div class="record-info">
                            <span class="record-date">위치 정보를 확인하고 주변 데이터를 불러오는 중입니다.</span>
                        </div>
                    </li>
                </ul>
            </section>
        </div>
    </section>
</main>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}" href="/map">감정지도</a>
    <a class="active" th:href="@{/profile}" href="/profile">프로필</a>
</nav>
</body>
</html>
