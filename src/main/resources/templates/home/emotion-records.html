<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>나의 감정 기록 - LastSys</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260519b)}" href="../../static/css/mainpage.css?v=20260519b">
    <link rel="stylesheet" th:href="@{/css/profile.css(v=20260527a)}" href="../../static/css/profile.css?v=20260527a">
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<main class="mobile-page home-app" aria-label="LastSys 나의 감정 기록 화면">
    <div class="bg-shape bg-shape-3"></div>
    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
        </header>

        <div class="main-content">
            <a th:href="@{/profile}" href="/profile" class="back-btn">← 프로필로 돌아가기</a>
            
            <section class="emotion-records-section">
                <div class="emotion-records-head">
                    <h3>나의 감정 기록</h3>
                    <p>최근 기록된 감정 상태를 확인합니다.</p>
                </div>

                <ul class="record-list">
                    <li class="record-item" th:if="${currentCondition != null}">
                        <div class="record-info">
                            <span class="record-date">최근 설정한 상태</span>
                            
                            <span class="record-emotion" th:if="${currentCondition.toString() == 'NORMAL'}">
                                <span>😊</span> 보통
                            </span>
                            <span class="record-emotion" th:if="${currentCondition.toString() == 'SAD'}">
                                <span>☁️</span> 우울/가라앉음
                            </span>
                            <span class="record-emotion" th:if="${currentCondition.toString() == 'TIRED'}">
                                <span>🥱</span> 피곤함
                            </span>
                            <span class="record-emotion" th:if="${currentCondition.toString() == 'STRESSED'}">
                                <span>⚡</span> 스트레스
                            </span>
                        </div>
                    </li>

                    <li class="record-item" th:if="${currentCondition == null or currentCondition.toString() == 'ANY'}">
                        <div class="empty-state">
                            아직 설정된 감정 상태가 없습니다.<br>
                            <a class="profile-inline-link" th:href="@{/profile/mission-settings}" href="/profile/mission-settings">미션 설정하러 가기</a>
                        </div>
                    </li>
                </ul>
            </section>
        </div>
    </section>
</main>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}" href="/map">감정지도</a>
    <a class="active" th:href="@{/profile}" href="/profile">프로필</a>
</nav>
</body>
</html>
