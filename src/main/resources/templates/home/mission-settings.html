<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>선행 미션 설정 - LastSys</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260513a)}">
    
    <style>
        .mission-settings { display: flex; flex-direction: column; gap: 14px; background: rgba(255, 255, 255, 0.76); border: 1px solid rgba(255, 255, 255, 0.92); border-radius: 20px; padding: 20px; box-shadow: 0 12px 24px rgba(26, 77, 57, 0.06); }
        .mission-settings form { display: flex; flex-direction: column; gap: 14px; }
        .mission-settings-head { display: flex; flex-direction: column; gap: 4px; }
        .mission-settings-head h3 { color: var(--primary-color); font-size: 18px; font-weight: 850; }
        .mission-settings-head p { color: var(--text-sub, #666); font-size: 13px; font-weight: 650; line-height: 1.45; word-break: keep-all; }
        .mission-settings-saved { padding: 10px 12px; border-radius: 12px; background: rgba(49, 112, 74, 0.1); color: var(--primary-color); font-size: 13px; font-weight: 800; }
        .mission-mode-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mission-mode-options label { min-height: 62px; display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid rgba(26, 77, 57, 0.1); border-radius: 14px; background: rgba(248, 250, 249, 0.88); color: var(--text-main); font-size: 14px; font-weight: 800; cursor: pointer; }
        .mission-mode-options input { accent-color: var(--primary-color); }
        .mission-setting-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .mission-setting-field { display: flex; flex-direction: column; gap: 6px; }
        .mission-setting-field span { color: var(--text-sub, #666); font-size: 12px; font-weight: 850; }
        .mission-setting-field select { width: 100%; height: 46px; padding: 0 12px; border: 1px solid rgba(26, 77, 57, 0.12); border-radius: 12px; background: rgba(248, 250, 249, 0.94); color: var(--text-main); font: inherit; font-size: 14px; font-weight: 750; }
        .mission-setting-grid.is-disabled { opacity: 0.48; }
        .mission-setting-grid.is-disabled select { cursor: not-allowed; }
        .mission-settings-submit { width: 100%; min-height: 48px; border: 0; border-radius: 15px; background: var(--primary-color); color: #FFFFFF; font: inherit; font-size: 14px; font-weight: 850; cursor: pointer; box-shadow: 0 12px 22px rgba(26, 77, 57, 0.16); }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--text-main); font-weight: 800; text-decoration: none; margin-bottom: 16px; font-size: 15px; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page home-app">
    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}">
                <img class="app-logo" th:src="@{/images/logo.png}" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
        </header>

        <div class="main-content">
            <a th:href="@{/profile}" class="back-btn">← 프로필로 돌아가기</a>
            
            <section class="mission-settings">
                <div class="mission-settings-head">
                    <h3>선행 미션 방식</h3>
                    <p>평범 모드는 랜덤 미션을, 규칙 기반 모드는 현재 역할과 상황에 맞는 미션을 우선 보여줍니다.</p>
                </div>
                
                <p class="mission-settings-saved" th:if="${param.missionSettingsSaved}">미션 설정이 저장되었습니다.</p>

                <form th:action="@{/profile/mission-settings}" th:object="${missionSettingsForm}" method="post">
                    <div class="mission-mode-options">
                        <label>
                            <input type="radio" th:field="*{mode}" value="PLAIN">
                            <span>평범 모드</span>
                        </label>
                        <label>
                            <input type="radio" th:field="*{mode}" value="RULE_BASED">
                            <span>규칙 기반 모드</span>
                        </label>
                    </div>

                    <div class="mission-setting-grid" id="mission-rule-fields">
                        <label class="mission-setting-field">
                            <span>직업/역할</span>
                            <select th:field="*{lifeStage}" data-rule-field>
                                <option value="ANY">상관없음</option>
                                <option value="STUDENT">학생</option>
                                <option value="WORKER">직장인</option>
                                <option value="FREELANCER">프리랜서</option>
                                <option value="CAREGIVER">돌봄/가사 중심</option>
                            </select>
                        </label>

                        <label class="mission-setting-field">
                            <span>주로 있는 환경</span>
                            <select th:field="*{environmentType}" data-rule-field>
                                <option value="ANY">상관없음</option>
                                <option value="SCHOOL">학교</option>
                                <option value="OFFICE">회사</option>
                                <option value="HOME">집</option>
                                <option value="OUTSIDE">외부/이동 중</option>
                            </select>
                        </label>

                        <label class="mission-setting-field">
                            <span>오늘의 상태</span>
                            <select th:field="*{conditionType}" data-rule-field>
                                <option value="NORMAL">보통</option>
                                <option value="SAD">우울/가라앉음</option>
                                <option value="TIRED">피곤함</option>
                                <option value="STRESSED">스트레스</option>
                            </select>
                        </label>
                    </div>

                    <button class="mission-settings-submit" type="submit">저장하기</button>
                </form>
            </section>
        </div>
    </section>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const modeInputs = document.querySelectorAll('input[name="mode"]');
        const ruleFields = document.querySelectorAll('[data-rule-field]');
        const ruleFieldGroup = document.getElementById('mission-rule-fields');

        const updateRuleFields = () => {
            const selectedMode = document.querySelector('input[name="mode"]:checked')?.value || 'PLAIN';
            const disabled = selectedMode !== 'RULE_BASED';

            ruleFields.forEach((field) => field.disabled = disabled);
            ruleFieldGroup?.classList.toggle('is-disabled', disabled);
        };

        modeInputs.forEach((input) => input.addEventListener('change', updateRuleFields));
        updateRuleFields();
    });
</script>
</body>
</html>
