<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>프로필 수정 - LastSys</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
    <link rel="stylesheet" th:href="@{/css/mainpage.css(v=20260519b)}" href="../../static/css/mainpage.css?v=20260519b">
    <link rel="stylesheet" th:href="@{/css/profile.css(v=20260527a)}" href="../../static/css/profile.css?v=20260527a">
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<main class="mobile-page home-app" aria-label="LastSys 프로필 수정 화면">
    <div class="bg-shape bg-shape-3"></div>
    <section class="dashboard">
        <header class="app-header">
            <a class="app-brand" th:href="@{/}" href="/">
                <img class="app-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" alt="LastSys 로고">
                <span>LastSys</span>
            </a>
        </header>

        <div class="main-content">
            <a th:href="@{/profile}" href="/profile" class="back-btn">← 프로필로 돌아가기</a>
            
            <section class="edit-profile-section">
                <div class="edit-profile-head">
                    <h3>프로필 수정</h3>
                    <p>서비스에서 사용할 닉네임을 변경할 수 있습니다.</p>
                </div>

                <div class="avatar-edit-wrapper">
                    <div class="profile-avatar">🌿</div>
                </div>
                
                <div th:if="${errorMsg != null}" class="alert-msg alert-error" th:text="${errorMsg}"></div>
                <div th:if="${successMsg != null}" class="alert-msg alert-success" th:text="${successMsg}"></div>

                <form th:action="@{/profile/edit}" method="post">
                    <div class="input-group">
                        <span>닉네임</span>
                        <input type="text" name="nickname" class="input-field" th:value="${loginUser != null ? loginUser.nickname() : ''}" required placeholder="닉네임을 입력하세요">
                    </div>

                    <button type="submit" class="submit-btn">변경사항 저장</button>
                </form>
            </section>
        </div>
    </section>
</main>

<nav class="bottom-tabs" aria-label="하단 메뉴">
    <a th:href="@{/}" href="/">홈</a>
    <a th:href="@{/map}" href="/map">감정지도</a>
    <a class="active" th:href="@{/profile}" href="/profile">프로필</a>
</nav>
</body>
</html>
