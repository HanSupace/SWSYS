<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="application-name" th:content="${appName}" content="Plia">
    <title th:text="|회원가입 - ${appName}|">회원가입 - Plia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/home.css(v=20260512b)}" href="../../static/css/home.css?v=20260512b">
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>

<main class="mobile-page auth-page" aria-label="회원가입 화면">
    <section class="auth-panel">
        <a class="brand-link" th:href="@{/}" href="/">
            <img class="auth-logo" th:src="@{/images/logo.png}" src="../../static/images/logo.png" th:alt="|${appName} 로고|" alt="Plia 로고">
            <span th:text="${appName}">Plia</span>
        </a>

        <div class="auth-heading">
            <h1>회원가입</h1>
            <p>사용할 계정 정보를 입력해 주세요.</p>
        </div>

        <form class="signup-form" th:action="@{/signup}" th:object="${signupForm}" method="post" novalidate>
            <p class="form-error" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}">
                회원가입 오류
            </p>

            <label class="field">
                <span>아이디</span>
                <input type="text" th:field="*{username}" autocomplete="username" placeholder="영문, 숫자, 밑줄">
                <small class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">아이디 오류</small>
            </label>

            <label class="field">
                <span>비밀번호</span>
                <input type="password" th:field="*{password}" autocomplete="new-password" placeholder="8자 이상">
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">비밀번호 오류</small>
            </label>

            <label class="field">
                <span>비밀번호 확인</span>
                <input type="password" th:field="*{passwordConfirm}" autocomplete="new-password" placeholder="비밀번호 재입력">
                <small class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}">비밀번호 확인 오류</small>
            </label>

            <label class="field">
                <span>닉네임</span>
                <input type="text" th:field="*{nickname}" autocomplete="nickname" placeholder="4자 이상">
                <small class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}">닉네임 오류</small>
            </label>

            <button class="button button-primary submit-btn" type="submit">가입하기</button>
        </form>

        <a class="text-link" th:href="@{/}" href="/">처음 화면으로</a>
    </section>
</main>
</body>
</html>
